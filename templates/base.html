<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Elyra" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="nav">
    <a class="brand" href="{{ url_for('home') }}">Elyra</a>
    <div class="nav-links">
      <a href="{{ url_for('book') }}">Book Flights</a>
      {% if session.get("user") %}
        <span class="nav-user">{{ session.get("name", "Traveler") }}</span>
        <a class="nav-pill" href="{{ url_for('logout') }}">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}">Login</a>
        <a class="nav-pill" href="{{ url_for('signup') }}">Sign Up</a>
      {% endif %}
    </div>
  </nav>
  <main>{% block content %}{% endblock %}</main>
  <script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
</body>
</html>
